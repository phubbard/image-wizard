<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>image-wizard{% block title_extra %}{% endblock %}</title>
    <link rel="icon" href="/static/favicon.ico" type="image/x-icon">
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <style>
        :root {
            --bg: #1a1a2e;
            --bg2: #16213e;
            --fg: #e0e0e0;
            --muted: #a8b2c8;
            --accent: #3a6ea5;      /* pill background — lightened for contrast */
            --accent-deep: #0f3460; /* original dark navy, kept for borders/fills */
            --highlight: #e94560;
            --link: #7cc7ff;        /* default link colour on dark bg */
            --link-hover: #ffc870;
            --card: #1f2940;
            --border: #2a3a5c;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--fg);
            min-height: 100vh;
        }
        /* Default link colour: bright sky-blue on dark bg (WCAG AA on --bg). */
        a { color: var(--link); text-decoration: none; }
        a:hover { color: var(--link-hover); }
        /* Grid/thumbnail links inherit — the image itself carries the meaning. */
        .grid a, .face-card a { color: inherit; }
        nav {
            background: var(--bg2);
            padding: 0.8rem 1.5rem;
            display: flex;
            gap: 1.5rem;
            align-items: center;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        nav a {
            color: var(--fg);
            text-decoration: none;
            font-size: 0.95rem;
        }
        nav a:hover { color: var(--highlight); }
        nav .brand { font-weight: 700; font-size: 1.1rem; }
        .container { max-width: 1400px; margin: 0 auto; padding: 1rem; }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 0.5rem;
        }
        .grid a { display: block; position: relative; }
        /* Triangular ▶ glyph in the corner of any video thumbnail. */
        .grid a .video-badge {
            position: absolute;
            top: 6px;
            left: 6px;
            background: rgba(0,0,0,0.65);
            color: #fff;
            font-size: 0.75rem;
            line-height: 1;
            padding: 3px 6px;
            border-radius: 4px;
            pointer-events: none;
        }
        .grid img {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            border-radius: 4px;
            display: block;
            /* Resilience against thumb 404s / decode errors: a solid
               placeholder square keeps the grid uniform, and the
               transparent text colour hides the broken-image alt text
               that browsers render inside failed <img> elements
               (screen readers still get the alt attribute). */
            background: var(--card);
            color: transparent;
            font-size: 0;
        }
        .grid .caption {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.6);
            padding: 2px 6px;
            font-size: 0.7rem;
            border-radius: 0 0 4px 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        h1, h2 { margin: 1rem 0 0.5rem; }
        table { border-collapse: collapse; margin: 0.5rem 0; }
        td, th { padding: 0.3rem 0.8rem; text-align: left; border-bottom: 1px solid var(--border); }
        .pill {
            display: inline-block;
            background: var(--accent);
            color: var(--fg);
            text-decoration: none;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.8rem;
            margin: 2px;
            transition: background 0.15s;
        }
        a.pill:hover { background: var(--highlight); color: #fff; }
        a.pill.active {
            background: var(--highlight);
            color: #fff;
            box-shadow: 0 0 0 2px rgba(233,69,96,0.35);
        }
        form label { display: block; margin-top: 0.5rem; font-size: 0.85rem; }
        input, select {
            background: var(--card);
            color: var(--fg);
            border: 1px solid var(--border);
            padding: 0.4rem 0.6rem;
            border-radius: 4px;
            font-size: 0.9rem;
        }
        button, .btn {
            background: var(--highlight);
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9rem;
        }
        button:hover { opacity: 0.85; }
        .detail-img { max-width: 100%; max-height: 70vh; border-radius: 6px; }
        .sidebar { background: var(--card); padding: 1rem; border-radius: 6px; }
        .two-col { display: grid; grid-template-columns: 1fr 350px; gap: 1rem; align-items: start; }
        @media (max-width: 800px) { .two-col { grid-template-columns: 1fr; } }
        .face-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 1rem;
        }
        .face-card {
            background: var(--card);
            border-radius: 6px;
            padding: 0.5rem;
            text-align: center;
        }
        .face-card img {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            border-radius: 4px;
        }
        .face-card form { margin-top: 0.3rem; }
        .face-card input[type=text] { width: 100%; margin-bottom: 0.3rem; }
        .stats-bar { font-size: 0.85rem; color: var(--muted); margin-bottom: 0.5rem; }
    </style>
    {% block head_extra %}{% endblock %}
</head>
<body>
    <nav>
        <a href="/" class="brand">image-wizard</a>
        <a href="/">Timeline</a>
        <a href="/search">Search</a>
        <a href="/cameras">Cameras</a>
        <a href="/faces">Faces</a>
        <a href="/map">Map</a>
        <a href="/about">About</a>
        {% if filter_badge and filter_badge() %}
        <a href="/about" title="A subset of scanned directories is active. Click to manage."
           style="margin-left:auto;background:var(--highlight);color:#fff;padding:2px 10px;border-radius:12px;font-size:0.75rem;">
            ⌖ filtered
        </a>
        {% endif %}
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
