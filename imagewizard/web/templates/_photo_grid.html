{% for p in photos %}
<a href="/photo/{{ p['id'] }}">
    <img src="/thumb/{{ p['content_hash'] }}" loading="lazy"
         alt="{{ p['taken_at'] or '' }}">
    <span class="caption">
        {{ (p['taken_at'] or '')[:10] }}
        {% if p['city'] %} · {{ p['city'] }}{% endif %}
    </span>
</a>
{% endfor %}
{% if has_next %}
<div hx-get="/timeline-page?page={{ page + 1 }}"
     hx-trigger="revealed"
     hx-swap="afterend"
     hx-replace-url="/?page={{ page + 1 }}"
     style="height:1px;">
</div>
{% endif %}
