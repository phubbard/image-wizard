{% extends "base.html" %}
{% block title_extra %} — Faces{% endblock %}
{% block content %}
<h1>Face Clusters</h1>
<div class="stats-bar">{{ total }} clusters</div>
{% if clusters %}
<div class="face-grid" id="faces-grid">
    {% include "_faces_grid.html" %}
</div>
<script>
if (history.scrollRestoration) history.scrollRestoration = 'auto';
</script>
{% else %}
<p style="margin-top:2rem;color:#999;">No face clusters yet. Run <code>image-wizard cluster-faces</code> after indexing.</p>
{% endif %}
{% endblock %}
