{# Apple-Photos-style "Live" badge: a solid dot inside two dashed
   concentric rings. Included wherever a Live Photo still's thumbnail
   is rendered, guarded by `{% if p['live_video_id'] %}`. #}
<span class="live-badge" title="Live Photo">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <circle cx="12" cy="12" r="3" fill="currentColor" stroke="none"/>
        <circle cx="12" cy="12" r="6.5" stroke-dasharray="2 2.5"/>
        <circle cx="12" cy="12" r="9.5" stroke-dasharray="1.5 3"/>
    </svg>LIVE
</span>
