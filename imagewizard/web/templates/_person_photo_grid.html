{% for p in photos %}
<a id="photo-{{ p['id'] }}" href="/photo/{{ p['id'] }}?person={{ person|urlencode }}">
    <img src="/thumb/{{ p['content_hash'] }}" loading="lazy"
         alt="{{ p['taken_at'] or '' }}">
    <span class="caption">
        {{ (p['taken_at'] or '')[:10] }}
        {% if p['city'] %} · {{ p['city'] }}{% endif %}
    </span>
</a>
{% endfor %}
{% if has_next %}
<div hx-get="/person-page/{{ person|urlencode }}?page={{ page + 1 }}"
     hx-trigger="revealed"
     hx-swap="afterend"
     hx-replace-url="/person/{{ person|urlencode }}?page={{ page + 1 }}"
     style="height:1px;grid-column:1 / -1;">
</div>
{% endif %}
